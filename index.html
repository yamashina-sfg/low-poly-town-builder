<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ローポリタウンビルダー</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app"></div>
    <div id="reputation-panel" class="reputation-panel">
      <div id="reputation-title">静かな原っぱ</div>
      <div>評判: <span id="reputation-score">0</span></div>
    </div>
    <div id="onboarding-overlay" class="onboarding-overlay hidden">
      <div class="onboarding-card">
        <h2>ようこそ、ローポリタウンビルダーへ</h2>
        <ul>
          <li><strong>WASD / 矢印キー</strong>：移動</li>
          <li><strong>クリック</strong>：タイルを選んで建築</li>
          <li><strong>Eキー</strong>：ベッド・木・お店などを操作</li>
          <li><strong>Escキー</strong>：住居の外に出る</li>
        </ul>
        <button type="button" id="onboarding-close">はじめる</button>
      </div>
    </div>
    <button type="button" id="exit-building-button" class="exit-building-button hidden">
      外に出る (Esc)
    </button>
    <button type="button" id="action-prompt" class="action-prompt hidden">Eキーで眠る</button>
    <div id="status-message" class="status-message hidden"></div>
    <div id="resource-panel" class="resource-panel">
      <div>🪵 <span id="resource-wood">0</span></div>
      <div>💰 <span id="resource-money">0</span></div>
    </div>
    <canvas id="minimap-canvas" class="minimap" width="150" height="150"></canvas>
    <div id="touch-joystick" class="touch-joystick hidden">
      <div id="touch-joystick-knob" class="touch-joystick-knob"></div>
    </div>
    <div id="shop-panel" class="shop-panel hidden">
      <h3>お店</h3>
      <p>木材: <span id="shop-wood">0</span> ／ お金: <span id="shop-money">0</span></p>
      <div class="shop-buttons">
        <button type="button" id="shop-sell-wood">木材10を売る (+15円)</button>
        <button type="button" id="shop-buy-wood">木材10を買う (-20円)</button>
      </div>
      <button type="button" id="shop-close">閉じる</button>
    </div>
    <div id="player-panel" class="debug-panel">
      <div class="debug-stats">
        <div>時刻: <span id="stat-time">06:00</span></div>
        <div class="sleepiness-row">
          眠気:
          <span id="sleepiness-bar" class="sleepiness-bar"><span id="sleepiness-bar-fill"></span></span>
        </div>
      </div>
      <label class="debug-seed">
        シード
        <input type="number" id="seed-input" value="1" />
      </label>
      <div class="debug-character">
        <label>服の色 <input type="color" id="clothing-color-input" value="#3b6ea5" /></label>
        <label>帽子の色 <input type="color" id="hat-color-input" value="#b5533c" /></label>
      </div>
      <div class="debug-buttons">
        <button type="button" id="save-button">保存</button>
        <button type="button" id="load-button">読込</button>
        <button type="button" id="reset-button">リセット</button>
        <button type="button" id="mute-button">🔊</button>
      </div>
    </div>
    <div id="debug-info-panel" class="debug-panel debug-info-panel hidden">
      <div class="debug-stats">
        <div>チャンク数: <span id="stat-chunks">0</span></div>
        <div>タイル数: <span id="stat-tiles">0</span></div>
        <div>建物数: <span id="stat-buildings">0</span></div>
        <div>木の数: <span id="stat-trees">0</span></div>
        <div>FPS: <span id="stat-fps">--</span></div>
        <div>インスタンス数: <span id="stat-instances">0</span></div>
      </div>
      <div class="debug-info-hint">F3で閉じる</div>
    </div>
    <div id="build-menu" class="build-menu hidden">
      <div class="build-menu-tabs">
        <button type="button" class="tab-button active" data-tab="buildings">建物</button>
        <button type="button" class="tab-button" data-tab="furniture">家具</button>
        <button type="button" class="tab-button" data-tab="decorations">装飾</button>
        <button type="button" class="tab-button" data-tab="terrain">地形</button>
      </div>
      <div class="build-menu-panel" data-panel="buildings">
        <button type="button" data-type="house">住居</button>
        <button type="button" data-type="shop">お店</button>
        <button type="button" data-type="well">井戸</button>
        <button type="button" data-type="warehouse">倉庫</button>
        <button type="button" data-type="windmill" class="locked" disabled>風車（評判30で解放）</button>
      </div>
      <div class="build-menu-panel hidden" data-panel="furniture">
        <button type="button" data-type="bed">ベッド</button>
        <button type="button" data-type="table">テーブル</button>
        <button type="button" data-type="chair">椅子</button>
        <button type="button" data-type="fireplace">暖炉</button>
      </div>
      <div class="build-menu-panel hidden" data-panel="decorations">
        <button type="button" data-type="fence">柵</button>
        <button type="button" data-type="streetlamp">街灯</button>
        <button type="button" data-type="bench">ベンチ</button>
        <button type="button" data-type="flowerbed">花壇</button>
        <button type="button" data-type="signpost">看板</button>
        <button type="button" data-type="statue" class="locked" disabled>銅像（評判50で解放）</button>
      </div>
      <div class="build-menu-panel hidden" data-panel="terrain">
        <button type="button" data-type="tree">木</button>
        <button type="button" data-type="road">道路</button>
        <button type="button" data-type="water">水</button>
        <button type="button" data-type="clear">更地に戻す</button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
